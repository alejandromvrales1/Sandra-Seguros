---
layout: default
---
<article>
  <div class="page-hero">
    <div class="wrap" style="max-width:680px;">
      <span class="tag-pill tag-{{ page.category }}">{{ page.category }}</span>
      <h1 style="margin-top:16px;">{{ page.title }}</h1>
      <p style="font-family:var(--font-mono); font-size:13px; color:var(--muted); margin-top:14px;">
        {{ page.date | date: "%d de %B, %Y" }} · Por {{ site.business.name }}
      </p>
    </div>
  </div>
  <div class="wrap" style="padding: 48px 0 80px;">
    <div class="prose">
      {{ content }}
    </div>
    <div style="margin-top:48px; padding-top:32px; border-top:1px solid var(--line);">
      <p style="color:var(--muted); margin-bottom:16px;">¿Tienes dudas sobre tu seguro? Escríbeme directo.</p>
      <a class="btn btn-primary" href="https://wa.me/{{ site.business.whatsapp }}" target="_blank" rel="noopener">Cotizar por WhatsApp</a>
    </div>
  </div>
</article>
